name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  playwright:
    name: Playwright E2E (Desktop + Mobile)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: client
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install --with-deps

      - name: Wait for Vercel deployment
        id: vercel
        uses: vercel/action@v1
        with:
          alias: pr-${{ github.event.number }}

      - name: Get preview URL
        id: preview
        run: |
          if [ -n "${{ secrets.E2E_BASE_URL }}" ]; then
            echo "E2E_BASE_URL=${{ secrets.E2E_BASE_URL }}" >> $GITHUB_OUTPUT
          else
            echo "E2E_BASE_URL=https://pr-${{ github.event.number }}--syncro.vercel.app" >> $GITHUB_OUTPUT
          fi

      - name: Run Playwright tests
        working-directory: client
        env:
          CI: true
          E2E_BASE_URL: ${{ steps.preview.outputs.E2E_BASE_URL }}
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14

      - name: Upload failure screenshots and traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: client/test-results/
          retention-days: 14
